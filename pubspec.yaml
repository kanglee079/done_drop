name: done_drop
description: "DoneDrop — Personal discipline app. Create habits, complete them, capture proof moments, and share privately with accountability partners."
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── UI & Icons ──────────────────────────────────────────
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2

  # ── State Management + DI + Routing (GetX) ──────────────
  get: ^4.6.6

  # ── Firebase ────────────────────────────────────────────
  firebase_core: ^3.9.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.4.0
  firebase_app_check: ^0.3.2+4
  firebase_crashlytics: ^4.2.0
  firebase_analytics: ^11.6.0
  google_sign_in: ^6.2.2

  # ── Image / Camera ──────────────────────────────────────
  camera: ^0.12.0+1
  camera_android: ^0.10.10+16
  image_picker: ^1.1.2
  image: ^4.8.0
  flutter_image_compress: ^2.4.0

  # ── Navigation & Deep Links ─────────────────────────────
  # go_deep_link: handled via Firebase Dynamic Links in Phase 9

  # ── Local Storage ──────────────────────────────────────────────
  shared_preferences: ^2.3.5
  flutter_secure_storage: ^9.2.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ── Notifications ──────────────────────────────────────
  flutter_local_notifications: ^18.0.1
  flutter_timezone: ^5.0.2
  timezone: ^0.10.0

  # ── Subscriptions ───────────────────────────────────────
  # revenuecat: ^9.0.0  # Will be added in Phase 7

  # ── QR Code ──────────────────────────────────────────────
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  share_plus: ^10.1.4

  # ── Widgets ─────────────────────────────────────────────
  flutter_staggered_grid_view: ^0.7.0

  # ── Utils ────────────────────────────────────────────────
  uuid: ^4.5.1
  intl: ^0.20.2
  path_provider: ^2.1.5
  url_launcher: ^6.3.1
  connectivity_plus: ^6.1.4
  in_app_purchase: ^3.2.3
  in_app_purchase_android: ^0.4.0+10
  in_app_purchase_storekit: ^0.4.8+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/manrope_regular.woff2
        - asset: assets/fonts/manrope_regular.woff2
          weight: 600
        - asset: assets/fonts/manrope_regular.woff2
          weight: 700
    - family: Newsreader
      fonts:
        - asset: assets/fonts/newsreader_regular.woff2
        - asset: assets/fonts/newsreader_regular.woff2
          weight: 600
        - asset: assets/fonts/newsreader_regular.woff2
          weight: 700
        - asset: assets/fonts/newsreader_italic.woff2
          style: italic
        - asset: assets/fonts/newsreader_semi_bold_italic.woff2
          style: italic
          weight: 600
